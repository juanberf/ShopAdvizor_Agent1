  # SERVICIO 1 — MA COMMUNAUTÉ A TESTÉ (MALRG)
  # ============================================================
  - id: "S1"
    nombre: "Ma Communauté a Testé"
    subtitulo: "MonAvisLeRendGratuit (MALRG)"
    precio: "1.200€ por campaña / por EAN + generosidad productos"
    comercializado_por: "Négociateurs Carrefour"
    descripcion: >
      Campaña de test de producto con consumidores reales de Carrefour.
      El producto es enviado a casa de los testeadores seleccionados,
      quienes generan avis certificados publicados en el ecosistema Carrefour.
    que_incluye:
      - "Test del producto por ~300 shoppers Carrefour seleccionados"
      - "Generación de avis certificados (15 avis por producto por trimestre en media)"
      - "Difusión multicanal: email (+430K), newsletter MALRG (+430K), comunidad (+850K)"
      - "Evaluación pre y post con cuestionarios estructurados"
      - "+8.000 candidaturas de media por campaña"
      - "+95% tasa de evaluación"
    casos_de_uso_ideales:
      - "Lanzamiento de producto nuevo que necesita validación de consumidores"
      - "Producto con baja notoriedad que necesita generar trial"
      - "Producto con pocos avis en Carrefour.fr"
      - "Producto que necesita prueba de concepto antes de inversión en comunicación"
      - "Innovación que necesita validación antes de distribución masiva"
    triggers_desde_campana:
      - "Notoriedad baja (< 20%) — el producto necesita ser descubierto"
      - "Pocos reviews disponibles — el producto no tiene suficientes avis"
      - "SAZ Score bajo — el producto no ha sido validado por consumidores reales"
      - "Pre-test con expectativas altas pero sin validación post — la prueba no se ha hecho"
      - "Producto en fase de lanzamiento o relanzamiento"
    beneficios_clave:
      - "Genera contenido auténtico y certificado de consumidores reales"
      - "Amplifica el lanzamiento con difusión multicanal masiva"
      - "Proporciona insights de mejora del producto antes del lanzamiento masivo"
      - "Aumenta la visibilidad en Carrefour.fr con el sello 'Testé Communauté Carrefour'"
    call_to_action: >
      Contactar con su négociateur Carrefour para integrar MALRG
      en la próxima campaña de lanzamiento.

